name: Application Insights reports

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  probation-supervision-appointments:
    environment: azure-prod
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: ./.github/actions/app-insights-to-slack
        with:
          title: Probation Supervision Appointments API Events
          summary: Custom event totals for yesterday.
          query: |
            let startOfYesterday = startofday(datetime_utc_to_local(now(), "Europe/London") - 1d);
            let startOfToday = startofday(datetime_utc_to_local(now(), "Europe/London"));
            let startOfYesterdayUtc = datetime_local_to_utc(startOfYesterday, "Europe/London");
            let startOfTodayUtc = datetime_local_to_utc(startOfToday, "Europe/London");
            customEvents
            | where timestamp >= startOfYesterdayUtc and timestamp < startOfTodayUtc
            | where cloud_RoleName == "hmpps-probation-supervision-appointments-api"
            | summarize Count = count() by Event = name
            | order by Count desc
          slack_channel: manage-people-on-probation-alerts
          slack_token: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
          azure_app_id: ${{ secrets.AZURE_APPLICATION_INSIGHTS_APP_ID }}
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}