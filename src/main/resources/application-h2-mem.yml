wiremock:
  port: 9090

hmpps-auth:
  url: "http://localhost:${wiremock.port}/auth"

services:
  supervision-api:
    base-url: http://localhost:9094
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org:
      flywaydb: DEBUG
      springframework.boot.autoconfigure.flyway: DEBUG
#      springframework.security: DEBUG
#      springframework.security.web.access.intercept: DEBUG
#      springframework.security.web.FilterChainProxy: DEBUG

graph-client:
  client-id: id
  client-secret: secret
  tenant-id: id

flipt:
  url: "http://localhost:${wiremock.port}"
  token:  "test-token"

hmpps.sqs:
  provider: localstack
  queues:
    hmppsdomaineventsqueue:
      queueName: hmpps_domain_events_queue
      dlqName: hmpps_domain_events_dlq
      subscribeTopicId: hmppsdomaineventstopic
      subscribeFilter: '{"eventType":["probation.appointment.sms-sent-to-pop"] }'
      asyncQueueClient: true

  topics:
    hmppsdomaineventstopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}